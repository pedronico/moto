<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex, nofollow">
<title>Checklist Moto — Agosto</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,sans-serif;background:#f5f5f3;padding:1rem;color:#1a1a18}
.wrap{max-width:580px;margin:0 auto}
h1{font-size:15px;font-weight:500;margin-bottom:.75rem;color:#555}
.top{display:flex;justify-content:space-between;align-items:center;margin-bottom:.5rem}
#sum{font-size:13px;color:#888}
.rb{font-size:12px;color:#888;background:none;border:1px solid #ccc;border-radius:6px;padding:3px 10px;cursor:pointer;margin-left:6px}
.pb{height:3px;background:#e0e0de;margin-bottom:1rem;border-radius:2px;overflow:hidden}
.pf{height:100%;background:#2d9e75;border-radius:2px;transition:width .3s}
.sec{margin-bottom:.75rem;background:#fff;border:1px solid #e0e0de;border-radius:10px;overflow:hidden}
.sh{display:flex;padding:.6rem 1rem;background:#f9f9f7;border-bottom:1px solid #e0e0de;align-items:center}
.sh b{font-size:13px;font-weight:500}
.sc{font-size:12px;color:#999;margin-left:auto}
.delsec{font-size:14px;color:#ccc;margin-left:8px;cursor:pointer;border:none;background:none}
.it{border-bottom:1px solid #f0f0ee}
.itrow{display:flex;gap:10px;padding:.55rem 1rem;cursor:pointer;user-select:none;align-items:flex-start}
.itrow:active{background:#f5f5f3}
.badge{flex-shrink:0;font-size:10.5px;font-weight:600;padding:2px 7px;border-radius:10px;margin-top:1px;white-space:nowrap;letter-spacing:.02em}
.b-none{background:#eee;color:#999}
.b-ok{background:#e1f5ee;color:#1d7d5a}
.b-test{background:#fdf1dc;color:#9a6b12}
.b-ordered{background:#e3edfb;color:#2b5fad}
.b-toorder{background:#fde4e1;color:#b3382c}
.it.s-ok .lb{color:#aaa;text-decoration:line-through}
.it.s-ok{opacity:.55}
.lb{font-size:14px;line-height:1.4}
.nt{font-size:12px;color:#aaa;margin-top:1px}
.lnk{font-size:12px;margin-top:2px}
.lnk a{color:#2b5fad;word-break:break-all}
.opts{display:none;padding:.4rem 1rem .7rem;gap:6px;flex-wrap:wrap;align-items:center}
.opts.open{display:flex}
.op{font-size:11.5px;padding:4px 10px;border-radius:12px;border:1px solid #ddd;background:#fafafa;cursor:pointer;color:#555}
.op:active{transform:scale(.96)}
.op-ok{color:#1d7d5a}.op-test{color:#9a6b12}.op-ordered{color:#2b5fad}.op-toorder{color:#b3382c}.op-skip{color:#888}.op-clear{color:#bbb}
.op-del{color:#b3382c;border-color:#eebbb5}
.op-mv{color:#888;padding:4px 8px}
.linkbox{display:none;width:100%;margin-top:6px}
.linkbox.open{display:flex;gap:6px}
.linkbox input{flex:1;padding:5px 8px;border:1px solid #ccc;border-radius:6px;font-size:12.5px}
.linkbox button,.addbox button,#addsec button{padding:5px 12px;border:1px solid #2d9e75;background:#2d9e75;color:#fff;border-radius:6px;font-size:12px;cursor:pointer}
.addrow{padding:.45rem 1rem;font-size:12.5px;color:#2d9e75;cursor:pointer;user-select:none}
.addbox{display:none;padding:.4rem 1rem .7rem;gap:6px;flex-direction:column}
.addbox.open{display:flex}
.addbox input{padding:6px 8px;border:1px solid #ccc;border-radius:6px;font-size:13px}
#addsec{margin-top:.5rem}
#addsec .addbox{padding:.4rem 0}
#addseclink{font-size:12.5px;color:#2d9e75;cursor:pointer;user-select:none}
#skipwrap{margin-top:1.25rem;display:none}
#skipwrap h2{font-size:13px;font-weight:500;color:#999;margin-bottom:.5rem}
#skiplist{background:#fff;border:1px solid #e0e0de;border-radius:10px;overflow:hidden}
.skipit{display:flex;gap:10px;padding:.5rem 1rem;border-bottom:1px solid #f0f0ee;cursor:pointer;font-size:13.5px;color:#aaa;text-decoration:line-through}
.skipit:last-child{border-bottom:none}
#status{font-size:11px;color:#bbb;text-align:right;margin-top:.75rem}
#tokbar{display:none;background:#fff8e5;border:1px solid #eedfa8;border-radius:8px;padding:.6rem .8rem;margin-bottom:1rem;font-size:13px}
#tokbar input{width:100%;margin-top:6px;padding:6px;border:1px solid #ccc;border-radius:6px;font-size:13px}
#tokbar button{margin-top:6px;padding:5px 12px;border:1px solid #2d9e75;background:#2d9e75;color:#fff;border-radius:6px;font-size:13px;cursor:pointer}
</style>
</head>
<body>
<div class="wrap">
<h1>Checklist camping moto</h1>
<div id="tokbar">
Per salvare le modifiche serve il token GitHub (una volta sola, resta su questo dispositivo):
<input type="password" id="tok" placeholder="github_pat_...">
<button onclick="saveTok()">Salva token</button>
</div>
<div class="top"><span id="sum">Caricamento…</span><span><button class="rb" onclick="askTok()">Token</button><button class="rb" onclick="rst()">Reset</button></span></div>
<div class="pb"><div class="pf" id="pf" style="width:0%"></div></div>
<div id="cl"></div>
<div id="addsec">
  <span id="addseclink" onclick="toggleAddSec()">+ nuova categoria</span>
  <div class="addbox" id="addsecbox">
    <input id="secname" placeholder="nome categoria">
    <button onclick="addSection()">Aggiungi categoria</button>
  </div>
</div>
<div id="skipwrap"><h2>Non più necessari</h2><div id="skiplist"></div></div>
<div id="status"></div>
</div>
<script>
const API='https://api.github.com/repos/pedronico/moto/contents/state.json';
let SHA=null;
function tok(){return localStorage.getItem('gh_token')||'';}
function hdr(){const h={'Accept':'application/vnd.github+json'};const t=tok();if(t)h['Authorization']='Bearer '+t;return h;}
function askTok(){document.getElementById('tokbar').style.display='block';}
function saveTok(){
  const v=document.getElementById('tok').value.trim();
  if(v){localStorage.setItem('gh_token',v);document.getElementById('tokbar').style.display='none';document.getElementById('status').textContent='token salvato su questo dispositivo';}
}

const STATES={
  ok:{label:"OK",badge:"b-ok"},
  test:{label:"DA TESTARE",badge:"b-test"},
  ordered:{label:"ORDINATO",badge:"b-ordered"},
  toorder:{label:"DA ORDINARE",badge:"b-toorder"},
};

// Default structure, used only on first load / migration
const DEFAULT=[
  {l:"Dormire",items:[
    {t:"DD Frontline Hammock"},
    {t:"Tarp",n:"Essenziale, temporali improvvisi anche ad agosto al sud"},
    {t:"Corda sottile 5-6m"},
    {t:"Liner / lenzuolo sacco",n:"Al posto del sacco 5°C, agosto al sud è caldo"},
    {t:"DD Underblanket",n:"Probabilmente non necessario ad agosto, valuta"},
  ]},
  {l:"Repellenti insetti",items:[
    {t:"Icaridina 20%"},
    {t:"Permethrin",n:"Da applicare sui vestiti"},
    {t:"Flextail Tiny Repeller S",n:"Ha luce integrata, valuta se serve anche la lanterna"},
  ]},
  {l:"Illuminazione",items:[
    {t:"Lampada frontale"},
    {t:"Nitecore LR40",n:"Valuta se necessaria, Flextail ha già una luce"},
  ]},
  {l:"Elettronica",items:[
    {t:"Power bank (10.000-20.000 mAh)"},
    {t:"Caricatore USB da manubrio"},
  ]},
  {l:"Cucina",items:[
    {t:"Fornellino + pentolino"},
    {t:"Cartucce gas di riserva",n:"Al sud in zone remote possono essere difficili da trovare"},
    {t:"Accendino + riserva"},
    {t:"Multitool tipo Leatherman",n:"Copre sia multitool meccanico che coltellino"},
  ]},
  {l:"Moto & riparazioni",items:[
    {t:"Dynaplug + inserter (tubeless)"},
    {t:"CO2 cartucce 16g x3 + adattatore"},
    {t:"Leve smontaggio pneumatico"},
    {t:"Camera d'aria emergenza",n:"Misura Himalayan"},
    {t:"Compressore Xiaomi Air 2"},
    {t:"Acqua saponata + guanti monouso"},
    {t:"Jump starter (NOCO GB40 o GB20)"},
    {t:"Fascette + nastro americano + fil di ferro"},
    {t:"Fusibili di ricambio Himalayan"},
  ]},
  {l:"Salute & igiene",items:[
    {t:"Kit pronto soccorso base"},
    {t:"Crema solare alta protezione"},
    {t:"Pastiglie Micropur",n:"Purificazione acqua, più compatte del Sawyer Squeeze"},
  ]},
  {l:"Organizzazione",items:[
    {t:"Dry bag / sacchetti impermeabili",n:"Per elettronica e documenti"},
    {t:"Cuscino comprimibile"},
  ]},
];

let SEC=[]; // live structure: [{l, items:[{t,n,s,link}]}]
let saveTimer=null,openId=null;

function esc(s){const d=document.createElement('div');d.textContent=s||'';return d.innerHTML;}

const cl=document.getElementById("cl");

function render(){
  cl.innerHTML="";
  const skiplist=document.getElementById("skiplist");
  skiplist.innerHTML="";
  let okCount=0,active=0,skipped=0;

  SEC.forEach((sec,si)=>{
    const d=document.createElement("div");
    d.className="sec";
    let secOk=0,secActive=0;
    const visItems=[];
    sec.items.forEach((it,ii)=>{
      if(it.s==="skip"){
        skipped++;
        const row=document.createElement("div");
        row.className="skipit";
        row.textContent=it.t;
        row.title="Tocca per ripristinare";
        row.onclick=()=>{delete it.s;render();scheduleSave();};
        skiplist.appendChild(row);
        return;
      }
      visItems.push(ii);
      active++;secActive++;
      if(it.s==="ok"){okCount++;secOk++;}
    });

    const emptyDel=sec.items.length===0?`<button class="delsec" onclick="delSection(${si})" title="Elimina categoria">✕</button>`:"";
    d.innerHTML=`<div class="sh"><b>${esc(sec.l)}</b><span class="sc">${secActive?secOk+"/"+secActive:"—"}</span>${emptyDel}</div>`;

    sec.items.forEach((it,ii)=>{
      if(it.s==="skip")return;
      const id=si+"_"+ii;
      const st=it.s;
      const w=document.createElement("div");
      w.className="it"+(st==="ok"?" s-ok":"");
      const badge=st&&STATES[st]?`<span class="badge ${STATES[st].badge}">${STATES[st].label}</span>`:`<span class="badge b-none">—</span>`;
      const link=(it.link&&st==="toorder")?`<div class="lnk"><a href="${esc(it.link)}" target="_blank" rel="noopener" onclick="event.stopPropagation()">${esc(it.link)}</a></div>`:"";
      w.innerHTML=`
<div class="itrow" onclick="toggleOpts('${id}')">
  ${badge}
  <div style="flex:1">
    <div class="lb">${esc(it.t)}</div>
    ${it.n?`<div class="nt">${esc(it.n)}</div>`:""}
    ${link}
  </div>
</div>
<div class="opts${openId===id?' open':''}" id="op${id}">
  <span class="op op-ok" onclick="setState(${si},${ii},'ok',event)">OK</span>
  <span class="op op-test" onclick="setState(${si},${ii},'test',event)">Da installare/testare</span>
  <span class="op op-ordered" onclick="setState(${si},${ii},'ordered',event)">Ordinato</span>
  <span class="op op-toorder" onclick="setState(${si},${ii},'toorder',event)">Da ordinare</span>
  <span class="op op-skip" onclick="setState(${si},${ii},'skip',event)">Non più necessario</span>
  <span class="op op-clear" onclick="setState(${si},${ii},null,event)">Azzera</span>
  <span class="op op-mv" onclick="move(${si},${ii},-1,event)" title="Sposta su">↑</span>
  <span class="op op-mv" onclick="move(${si},${ii},1,event)" title="Sposta giù">↓</span>
  <span class="op op-del" onclick="delItem(${si},${ii},event)">Elimina</span>
  <div class="linkbox${(st==='toorder')?' open':''}" id="lb${id}">
    <input type="url" id="li${id}" placeholder="link prodotto (opzionale)" value="${esc(it.link||'')}">
    <button onclick="saveLink(${si},${ii},event)">Salva</button>
  </div>
</div>`;
      d.appendChild(w);
    });

    // add-item row
    const ar=document.createElement("div");
    ar.innerHTML=`<div class="addrow" onclick="toggleAdd(${si})">+ aggiungi voce</div>
<div class="addbox" id="ab${si}">
  <input id="ai${si}" placeholder="nome voce">
  <input id="an${si}" placeholder="nota (opzionale)">
  <button onclick="addItem(${si})">Aggiungi</button>
</div>`;
    d.appendChild(ar);
    cl.appendChild(d);
  });

  document.getElementById("skipwrap").style.display=skipped?"block":"none";
  const p=active?Math.round(okCount/active*100):0;
  document.getElementById("pf").style.width=p+"%";
  document.getElementById("sum").textContent=okCount+" di "+active+" pronti ("+p+"%)";
}

function toggleOpts(id){
  openId=(openId===id)?null:id;
  render();
}

function setState(si,ii,s,ev){
  ev.stopPropagation();
  const it=SEC[si].items[ii];
  if(s===null){delete it.s;delete it.link;openId=null;}
  else{
    it.s=s;
    if(s!=="toorder"){delete it.link;openId=null;}
    // keep panel open for toorder so link input is visible
  }
  render();
  if(s==="toorder"){const li=document.getElementById("li"+si+"_"+ii);if(li)li.focus();}
  scheduleSave();
}

function saveLink(si,ii,ev){
  ev.stopPropagation();
  const v=document.getElementById("li"+si+"_"+ii).value.trim();
  const it=SEC[si].items[ii];
  if(v)it.link=v;else delete it.link;
  openId=null;
  render();
  scheduleSave();
}

function move(si,ii,dir,ev){
  ev.stopPropagation();
  const arr=SEC[si].items;
  const j=ii+dir;
  if(j<0||j>=arr.length)return;
  [arr[ii],arr[j]]=[arr[j],arr[ii]];
  openId=si+"_"+j;
  render();
  scheduleSave();
}

function delItem(si,ii,ev){
  ev.stopPropagation();
  if(!confirm('Eliminare "'+SEC[si].items[ii].t+'"?'))return;
  SEC[si].items.splice(ii,1);
  openId=null;
  render();
  scheduleSave();
}

function toggleAdd(si){
  document.getElementById("ab"+si).classList.toggle("open");
  const i=document.getElementById("ai"+si);
  if(document.getElementById("ab"+si).classList.contains("open"))i.focus();
}

function addItem(si){
  const t=document.getElementById("ai"+si).value.trim();
  if(!t)return;
  const n=document.getElementById("an"+si).value.trim();
  const it={t};
  if(n)it.n=n;
  SEC[si].items.push(it);
  render();
  scheduleSave();
}

function toggleAddSec(){
  document.getElementById("addsecbox").classList.toggle("open");
  document.getElementById("secname").focus();
}

function addSection(){
  const l=document.getElementById("secname").value.trim();
  if(!l)return;
  SEC.push({l,items:[]});
  document.getElementById("secname").value="";
  document.getElementById("addsecbox").classList.remove("open");
  render();
  scheduleSave();
}

function delSection(si){
  if(SEC[si].items.length>0)return;
  if(!confirm('Eliminare la categoria "'+SEC[si].l+'"?'))return;
  SEC.splice(si,1);
  render();
  scheduleSave();
}

function rst(){
  if(!confirm("Reset: azzera tutti gli stati (le voci restano)?"))return;
  SEC.forEach(s=>s.items.forEach(it=>{delete it.s;delete it.link;}));
  render();
  scheduleSave();
}

function scheduleSave(){clearTimeout(saveTimer);saveTimer=setTimeout(save,1200);}

function b64encode(str){return btoa(unescape(encodeURIComponent(str)));}
function b64decode(str){return decodeURIComponent(escape(atob(str)));}

async function save(){
  if(!tok()){askTok();document.getElementById("status").textContent="serve il token per salvare";return;}
  document.getElementById("status").textContent="salvataggio…";
  try{
    const content=b64encode(JSON.stringify({sections:SEC,updated:new Date().toISOString()}));
    let body=JSON.stringify({message:"update checklist",content,sha:SHA});
    let r=await fetch(API,{method:"PUT",headers:{...hdr(),"Content-Type":"application/json"},body});
    if(!r.ok&&(r.status===409||r.status===422)){
      await refreshSHA();
      body=JSON.stringify({message:"update checklist",content,sha:SHA});
      r=await fetch(API,{method:"PUT",headers:{...hdr(),"Content-Type":"application/json"},body});
    }
    if(r.ok){
      const j=await r.json();
      SHA=j.content.sha;
      document.getElementById("status").textContent="salvato "+new Date().toLocaleTimeString('it-IT',{hour:'2-digit',minute:'2-digit'});
    }else if(r.status===401||r.status===403){
      document.getElementById("status").textContent="token non valido o scaduto";
      askTok();
    }else{
      document.getElementById("status").textContent="errore salvataggio ("+r.status+")";
    }
  }catch(e){document.getElementById("status").textContent="offline, dati non salvati";}
}

async function refreshSHA(){
  const r=await fetch(API+"?t="+Date.now(),{headers:hdr()});
  const j=await r.json();
  SHA=j.sha;
  return j;
}

function migrate(state){
  // Newest format
  if(state.sections)return state.sections;
  // items format {id:{s,link}} -> merge into DEFAULT
  const sec=JSON.parse(JSON.stringify(DEFAULT));
  if(state.items){
    Object.entries(state.items).forEach(([id,v])=>{
      const [si,ii]=id.split("_").map(Number);
      if(sec[si]&&sec[si].items[ii]){
        if(v.s)sec[si].items[ii].s=v.s;
        if(v.link)sec[si].items[ii].link=v.link;
      }
    });
  }else if(state.checked){
    state.checked.forEach(id=>{
      const [si,ii]=id.split("_").map(Number);
      if(sec[si]&&sec[si].items[ii])sec[si].items[ii].s="ok";
    });
  }
  return sec;
}

async function load(){
  try{
    const j=await refreshSHA();
    const state=JSON.parse(b64decode(j.content.replace(/\n/g,"")));
    SEC=migrate(state);
    render();
    if(state.updated)document.getElementById("status").textContent="ultimo salvataggio: "+new Date(state.updated).toLocaleString('it-IT',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'});
    if(!tok())askTok();
  }catch(e){
    SEC=JSON.parse(JSON.stringify(DEFAULT));
    render();
    document.getElementById("status").textContent="impossibile caricare lo stato";
  }
}

load();
</script>
</body>
</html>
